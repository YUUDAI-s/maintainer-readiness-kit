name: Maintainer readiness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests
      - uses: ./
        with:
          repo: YUUDAI-s/maintainer-readiness-kit
          fail-under: "90"
          stale-days: "14"
          output: readiness-report.md
          sarif: readiness.sarif
          badge-json: readiness-badge.json
      - run: test -s readiness-report.md && test -s readiness.sarif && test -s readiness-badge.json
